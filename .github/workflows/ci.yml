name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "devutils"

      - name: Run tests
        run: cargo test --bin devutils -- --test-threads=4

      - name: Run clippy
        run: cargo clippy --bin devutils -- -D warnings

      - name: Run fmt
        run: cargo fmt --all -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devutils-${{ matrix.target }}
          path: target/release/devutils

  build-check:
    name: Build Check (cross-compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu, aarch64-apple-darwin

      - name: Check cross-compile
        run: |
          rustup target add aarch64-unknown-linux-gnu aarch64-apple-darwin
          cargo check --target aarch64-unknown-linux-gnu
          cargo check --target aarch64-apple-darwin

  utils-test:
    name: Utils Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Test utils
        run: |
          ./target/release/devutils utils uuid
          ./target/release/devutils utils now
          ./target/release/devutils utils pass 16
          ./target/release/devutils utils base64 hello
          ./target/release/devutils utils unbase64 aGVsbG8=
          ./target/release/devutils utils sha256 hello
          ./target/release/devutils utils md5 hello
          ./target/release/devutils utils hex hello
          ./target/release/devutils utils urlenc "hello world"
          ./target/release/devutils utils yaml "name: test"
          ./target/release/devutils utils hostname
          ./target/release/devutils utils whoami
          ./target/release/devutils utils docker
          ./target/release/devutils utils ps

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run security audit
        run: |
          cargo install cargo-audit || true
          cargo audit || true